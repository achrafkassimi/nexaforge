<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Login</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-mark">N</div>
            <div class="login-logo-name">NexaForge</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login', this)">Login</button>
            <button class="tab" onclick="switchTab('register', this)">Register</button>
        </div>

        <!-- LOGIN -->
        <div class="panel active" id="panel-login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@nexaforge.com" onkeydown="if(event.key==='Enter')login()">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
            </div>
            <div id="login-msg"></div>
            <button class="submit-btn" onclick="login()">Login</button>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Achraf Kassimi">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="you@nexaforge.com">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role">
                    <option value="super_admin">Super Admin</option>
                    <option value="manager">Manager</option>
                    <option value="chef_projet">Chef de Projet</option>
                    <option value="agent">Agent</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <div id="reg-msg"></div>
            <button class="submit-btn" onclick="register()">Create Account</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';

        // If already logged in → go to dashboard
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            btn.classList.add('active');
        }

        async function login() {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const msg      = document.getElementById('login-msg');
            msg.textContent = '';

            if (!email || !password) {
                msg.className = 'msg-error';
                msg.textContent = 'Email and password are required.';
                return;
            }

            try {
                const res  = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    msg.className   = 'msg-success';
                    msg.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                } else {
                    msg.className   = 'msg-error';
                    msg.textContent = typeof data.detail === 'string' ? data.detail : 'Invalid credentials';
                }
            } catch {
                msg.className   = 'msg-error';
                msg.textContent = 'Cannot reach the server. Is the backend running?';
            }
        }

        async function register() {
            const name     = document.getElementById('reg-name').value.trim();
            const email    = document.getElementById('reg-email').value.trim();
            const role     = document.getElementById('reg-role').value;
            const password = document.getElementById('reg-password').value;
            const msg      = document.getElementById('reg-msg');
            msg.textContent = '';

            if (!name || !email || !password) {
                msg.className   = 'msg-error';
                msg.textContent = 'All fields are required.';
                return;
            }

            try {
                const res  = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: name, role })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.className   = 'msg-success';
                    msg.textContent = 'Account created! Please login.';
                    setTimeout(() => {
                        document.querySelectorAll('.tab')[0].click();
                        document.getElementById('login-email').value = email;
                    }, 1200);
                } else {
                    msg.className   = 'msg-error';
                    msg.textContent = typeof data.detail === 'string' ? data.detail : 'Registration failed';
                }
            } catch {
                msg.className   = 'msg-error';
                msg.textContent = 'Cannot reach the server. Is the backend running?';
            }
        }
    </script>
</body>
</html>
