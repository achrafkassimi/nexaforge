<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Users</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        .user-cell  { display: flex; align-items: center; gap: 10px; }
        .user-name  { font-weight: 500; font-size: 13px; }
        .user-email { font-size: 11px; color: var(--muted); }
        .action-btns{ display: flex; gap: 8px; }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="app-sidebar"></div>
    <div class="main">
        <div class="page-header">
            <div class="page-title">Users</div>
            <button class="add-btn" onclick="openModal()">+ New User</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
                <tbody id="users-list">
                    <tr><td colspan="5" style="color:var(--muted);text-align:center;padding:40px">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-create">
    <div class="modal">
        <div class="modal-title">New User</div>
        <div class="form-group"><label>Full Name</label><input type="text" id="u-name" placeholder="Full Name"></div>
        <div class="form-group"><label>Email</label><input type="email" id="u-email" placeholder="email@nexaforge.com"></div>
        <div class="form-group"><label>Role</label>
            <select id="u-role">
                <option value="super_admin">Super Admin</option><option value="manager">Manager</option>
                <option value="chef_projet">Chef de Projet</option><option value="agent">Agent</option>
            </select>
        </div>
        <div class="form-group"><label>Password</label><input type="password" id="u-password" placeholder="••••••••"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="createUser()">Create</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-title">Edit User</div>
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Full Name</label><input type="text" id="edit-name"></div>
        <div class="form-group"><label>Role</label>
            <select id="edit-role">
                <option value="super_admin">Super Admin</option><option value="manager">Manager</option>
                <option value="chef_projet">Chef de Projet</option><option value="agent">Agent</option>
            </select>
        </div>
        <div class="form-group"><label>Status</label>
            <select id="edit-active"><option value="true">Active</option><option value="false">Inactive</option></select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="btn-confirm" onclick="updateUser()">Save</button>
        </div>
    </div>
</div>

<script src="../scripts/sidebar.js"></script>
<script>
    const API     = 'http://localhost:8000';
    const headers = NexaAuth.headers;
    let allUsers  = [];

    async function loadUsers() {
        const res = await fetch(`${API}/api/users/`, { headers });
        allUsers  = await res.json();
        const tbody = document.getElementById('users-list');
        if (!allUsers.length) { tbody.innerHTML = `<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:40px">No users found</td></tr>`; return; }
        tbody.innerHTML = allUsers.map(u => `
            <tr>
                <td><div class="user-cell">
                    <div class="user-avatar" style="width:32px;height:32px;border-radius:8px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">${u.full_name.slice(0,2).toUpperCase()}</div>
                    <div><div class="user-name">${u.full_name}</div><div class="user-email">${u.email}</div></div>
                </div></td>
                <td><span class="badge badge-${u.role}">${u.role.replace('_',' ')}</span></td>
                <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                <td><div class="action-btns">
                    <button class="btn btn-sm" onclick="openEditModal('${u.id}')">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Delete</button>
                </div></td>
            </tr>`).join('');
    }

    function openModal()     { document.getElementById('modal-create').classList.add('open'); }
    function closeModal()    { document.getElementById('modal-create').classList.remove('open'); }
    function closeEditModal(){ document.getElementById('modal-edit').classList.remove('open'); }

    function openEditModal(id) {
        const u = allUsers.find(u => u.id === id);
        document.getElementById('edit-id').value     = u.id;
        document.getElementById('edit-name').value   = u.full_name;
        document.getElementById('edit-role').value   = u.role;
        document.getElementById('edit-active').value = String(u.is_active);
        document.getElementById('modal-edit').classList.add('open');
    }

    async function createUser() {
        const res = await fetch(`${API}/api/auth/register`, { method:'POST', headers, body: JSON.stringify({ full_name: document.getElementById('u-name').value, email: document.getElementById('u-email').value, role: document.getElementById('u-role').value, password: document.getElementById('u-password').value }) });
        if (res.ok) { closeModal(); loadUsers(); showToast('User created'); }
        else { const e = await res.json(); showToast(e.detail || 'Error', 'error'); }
    }

    async function updateUser() {
        const id  = document.getElementById('edit-id').value;
        const res = await fetch(`${API}/api/users/${id}`, { method:'PUT', headers, body: JSON.stringify({ full_name: document.getElementById('edit-name').value, role: document.getElementById('edit-role').value, is_active: document.getElementById('edit-active').value === 'true' }) });
        if (res.ok) { closeEditModal(); loadUsers(); showToast('User updated'); }
    }

    async function deleteUser(id) {
        if (!confirm('Delete this user?')) return;
        await fetch(`${API}/api/users/${id}`, { method:'DELETE', headers });
        loadUsers(); showToast('User deleted');
    }

    loadUsers();
</script>
</body>
</html>
