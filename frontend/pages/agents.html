<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Agents</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        body { display: flex; min-height: 100vh; align-items: flex-start; }

        .sidebar {
            width: 240px; min-height: 100vh;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            padding: 24px 0; flex-shrink: 0;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .logo-mark {
            width: 32px; height: 32px; background: var(--purple);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-weight: 800;
        }
        .logo-name { font-weight: 700; font-size: 16px; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 20px; font-size: 14px; color: var(--muted);
            cursor: pointer; transition: all 0.15s;
            text-decoration: none; border-left: 2px solid transparent;
        }
        .nav-item:hover { color: var(--text); background: rgba(139,92,246,0.06); }
        .nav-item.active { color: var(--purple2); background: rgba(139,92,246,0.1); border-left-color: var(--purple); }

        .main { flex: 1; padding: 32px; min-height: 100vh; background: var(--bg); }

        .page-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 24px;
        }
        .page-title { font-size: 22px; font-weight: 700; }

        .add-btn {
            padding: 10px 20px; background: var(--purple);
            border: none; border-radius: 10px; color: white;
            font-size: 14px; cursor: pointer; width: auto;
        }

        .filters {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .filter-btn {
            padding: 7px 16px; border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent; color: var(--muted);
            font-size: 13px; cursor: pointer; width: auto;
            transition: all 0.15s;
        }
        .filter-btn.active {
            background: rgba(139,92,246,0.1);
            border-color: var(--purple); color: var(--purple2);
        }

        .agents-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .agent-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; padding: 24px;
            transition: border-color 0.2s;
        }
        .agent-card:hover { border-color: var(--purple); }

        .ac-header {
            display: flex; align-items: center;
            gap: 14px; margin-bottom: 16px;
        }

        .agent-avatar {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .av-backend  { background: #1d4ed8; }
        .av-frontend { background: #6d28d9; }
        .av-database { background: #047857; }
        .av-devops   { background: #b45309; }
        .av-manager  { background: #9d174d; }

        .ac-info { flex: 1; }
        .ac-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }

        .badge {
            display: inline-block; font-size: 11px;
            padding: 3px 10px; border-radius: 100px;
        }
        .badge-backend  { background: rgba(29,78,216,0.15); color: #93c5fd; }
        .badge-frontend { background: rgba(109,40,217,0.15); color: var(--purple3, #c4b5fd); }
        .badge-database { background: rgba(4,120,87,0.15); color: #6ee7b7; }
        .badge-devops   { background: rgba(180,83,9,0.15); color: #fcd34d; }
        .badge-manager  { background: rgba(157,23,77,0.15); color: #f9a8d4; }

        .status-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 14px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .dot-idle    { background: #4ade80; }
        .dot-working { background: #fbbf24; }
        .dot-blocked { background: #f87171; }
        .status-text { font-size: 12px; color: var(--muted); }

        .ac-footer {
            display: flex; justify-content: space-between;
            align-items: center; padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .ac-date { font-size: 11px; color: var(--muted2); }
        .ac-actions { display: flex; gap: 8px; }

        .btn-icon {
            padding: 5px 10px; border-radius: 6px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 12px; cursor: pointer;
            width: auto; transition: all 0.15s;
        }
        .btn-icon:hover { border-color: var(--purple); color: var(--purple2); }
        .btn-icon.danger:hover { border-color: #f87171; color: #f87171; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--muted); font-size: 14px;
            grid-column: span 3;
        }
        .empty-state div { font-size: 32px; margin-bottom: 12px; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; padding: 32px;
            width: 100%; max-width: 440px;
        }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        label { font-size: 12px; color: var(--muted); }
        select {
            width: 100%; padding: 11px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 14px; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel {
            flex: 1; padding: 11px; background: transparent;
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--muted); cursor: pointer; font-size: 14px;
        }
        .btn-confirm {
            flex: 1; padding: 11px; background: var(--purple);
            border: none; border-radius: 10px; color: white;
            cursor: pointer; font-size: 14px; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-mark">N</div>
        <div class="logo-name">NexaForge</div>
    </div>
    <a class="nav-item" href="dashboard.html">Dashboard</a>
    <a class="nav-item" href="projects.html">Projects</a>
    <a class="nav-item active" href="agents.html">Agents</a>
    <a class="nav-item" href="users.html">Users</a>
    <a class="nav-item" href="logs.html">Logs</a>
    <a class="nav-item" href="settings.html">Settings</a>
</div>

<div class="main">
    <div class="page-header">
        <div class="page-title">Agents</div>
        <button class="add-btn" onclick="openModal()">+ New Agent</button>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterAgents('all', this)">All</button>
        <button class="filter-btn" onclick="filterAgents('backend', this)">Backend</button>
        <button class="filter-btn" onclick="filterAgents('frontend', this)">Frontend</button>
        <button class="filter-btn" onclick="filterAgents('database', this)">Database</button>
        <button class="filter-btn" onclick="filterAgents('devops', this)">DevOps</button>
        <button class="filter-btn" onclick="filterAgents('manager', this)">Manager</button>
    </div>

    <div class="agents-grid" id="agents-grid">
        <div class="empty-state">
            <div>🤖</div>
            Loading agents...
        </div>
    </div>
</div>

<!-- MODAL CREATE -->
<div class="modal-overlay" id="modal-create">
    <div class="modal">
        <div class="modal-title">New Agent</div>
        <div class="form-group">
            <label>Agent Name</label>
            <input type="text" id="a-name" placeholder="Nova">
        </div>
        <div class="form-group">
            <label>Agent Type</label>
            <select id="a-type">
                <option value="backend">Backend</option>
                <option value="frontend">Frontend</option>
                <option value="database">Database</option>
                <option value="devops">DevOps</option>
                <option value="manager">Manager</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="createAgent()">Create</button>
        </div>
    </div>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-title">Edit Agent</div>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Agent Name</label>
            <input type="text" id="edit-name">
        </div>
        <div class="form-group">
            <label>Agent Type</label>
            <select id="edit-type">
                <option value="backend">Backend</option>
                <option value="frontend">Frontend</option>
                <option value="database">Database</option>
                <option value="devops">DevOps</option>
                <option value="manager">Manager</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="edit-status">
                <option value="idle">Idle</option>
                <option value="working">Working</option>
                <option value="blocked">Blocked</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="btn-confirm" onclick="updateAgent()">Save</button>
        </div>
    </div>
</div>

<script>
    const API = "http://localhost:8000"
    const token = localStorage.getItem('token')
    if (!token) window.location.href = 'login.html'

    const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
    }

    let allAgents = []

    async function loadAgents() {
        const res = await fetch(`${API}/api/agents/`, { headers })
        allAgents = await res.json()
        renderAgents(allAgents)
    }

    function renderAgents(agents) {
        const grid = document.getElementById('agents-grid')
        if (agents.length === 0) {
            grid.innerHTML = `<div class="empty-state"><div>🤖</div>No agents found</div>`
            return
        }
        grid.innerHTML = agents.map(a => `
            <div class="agent-card">
                <div class="ac-header">
                    <div class="agent-avatar av-${a.agent_type}">
                        ${a.name.slice(0,2).toUpperCase()}
                    </div>
                    <div class="ac-info">
                        <div class="ac-name">${a.name}</div>
                        <span class="badge badge-${a.agent_type}">${a.agent_type}</span>
                    </div>
                </div>
                <div class="status-row">
                    <div class="status-dot dot-${a.status}"></div>
                    <div class="status-text">${a.status}</div>
                </div>
                <div class="ac-footer">
                    <div class="ac-date">${new Date(a.created_at).toLocaleDateString()}</div>
                    <div class="ac-actions">
                        <button class="btn-icon" onclick="openEditModal('${a.id}')">Edit</button>
                        <button class="btn-icon danger" onclick="deleteAgent('${a.id}')">Delete</button>
                    </div>
                </div>
            </div>
        `).join('')
    }

    function filterAgents(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        if (type === 'all') {
            renderAgents(allAgents)
        } else {
            renderAgents(allAgents.filter(a => a.agent_type === type))
        }
    }

    function openModal() {
        document.getElementById('modal-create').classList.add('open')
    }
    function closeModal() {
        document.getElementById('modal-create').classList.remove('open')
    }

    function openEditModal(id) {
        const a = allAgents.find(a => a.id === id)
        document.getElementById('edit-id').value = a.id
        document.getElementById('edit-name').value = a.name
        document.getElementById('edit-type').value = a.agent_type
        document.getElementById('edit-status').value = a.status
        document.getElementById('modal-edit').classList.add('open')
    }
    function closeEditModal() {
        document.getElementById('modal-edit').classList.remove('open')
    }

    async function createAgent() {
        const res = await fetch(`${API}/api/agents/`, {
            method: 'POST', headers,
            body: JSON.stringify({
                name: document.getElementById('a-name').value,
                agent_type: document.getElementById('a-type').value
            })
        })
        if (res.ok) { closeModal(); loadAgents() }
    }

    async function updateAgent() {
        const id = document.getElementById('edit-id').value
        const res = await fetch(`${API}/api/agents/${id}`, {
            method: 'PUT', headers,
            body: JSON.stringify({
                name: document.getElementById('edit-name').value,
                agent_type: document.getElementById('edit-type').value,
                status: document.getElementById('edit-status').value
            })
        })
        if (res.ok) { closeEditModal(); loadAgents() }
    }

    async function deleteAgent(id) {
        if (!confirm('Delete this agent?')) return
        await fetch(`${API}/api/agents/${id}`, { method: 'DELETE', headers })
        loadAgents()
    }

    // WebSocket — real-time status update
    const ws = new WebSocket("ws://localhost:8000/ws/dashboard")
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data)
        if (data.type === "task_updated") loadAgents()
    }

    loadAgents()
    setInterval(loadAgents, 10000)
</script>
</body>
</html>
