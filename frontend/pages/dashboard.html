<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Dashboard</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
        .agent-list { display: flex; flex-direction: column; gap: 10px; }
        .agent-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); }
        .agent-avatar { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; }
        .agent-name { font-size: 13px; font-weight: 500; }
        .agent-type { font-size: 11px; color: var(--muted); }
        .add-btn-sm { padding: 7px 14px; background: var(--purple); border: none; border-radius: 8px; color: white; font-size: 13px; width: auto; margin-bottom: 14px; }
        .ws-notif { position: fixed; bottom: 24px; right: 24px; background: var(--purple); color: white; padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .ws-notif.show { opacity: 1; }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="app-sidebar"></div>

    <div class="main">
        <div class="page-title" style="margin-bottom:24px">Dashboard</div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-val" id="kpi-projects">—</div>
                <div class="kpi-label">Projects</div>
                <div class="kpi-badge">Total</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-val" id="kpi-agents">—</div>
                <div class="kpi-label">Agents</div>
                <div class="kpi-badge">Registered</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-val" id="kpi-tasks">—</div>
                <div class="kpi-label">Total Tasks</div>
                <div class="kpi-badge">All sprints</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-val" id="kpi-done">—</div>
                <div class="kpi-label">Done</div>
                <div class="kpi-badge">Completed</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="section-title">Recent Projects</div>
                <button class="add-btn-sm" onclick="location.href='projects.html'">+ New Project</button>
                <table>
                    <thead><tr><th>Name</th><th>Priority</th><th>Status</th></tr></thead>
                    <tbody id="projects-list">
                        <tr><td colspan="3" style="color:var(--muted)">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <div class="section-title">Agents</div>
                <button class="add-btn-sm" onclick="location.href='agents.html'">+ New Agent</button>
                <div class="agent-list" id="agents-list">
                    <div style="color:var(--muted);font-size:13px">Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-project">
    <div class="modal">
        <div class="modal-title">Create Project</div>
        <div class="form-group"><label>Name</label><input type="text" id="p-name" placeholder="My Project"></div>
        <div class="form-group"><label>Description</label><textarea id="p-desc" placeholder="Description..."></textarea></div>
        <div class="form-group"><label>Priority</label>
            <select id="p-priority">
                <option value="low">Low</option><option value="medium" selected>Medium</option>
                <option value="high">High</option><option value="critical">Critical</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('project')">Cancel</button>
            <button class="btn-confirm" onclick="createProject()">Create</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-agent">
    <div class="modal">
        <div class="modal-title">Create Agent</div>
        <div class="form-group"><label>Name</label><input type="text" id="a-name" placeholder="Atlas"></div>
        <div class="form-group"><label>Type</label>
            <select id="a-type">
                <option value="backend">Backend</option><option value="frontend">Frontend</option>
                <option value="database">Database</option><option value="devops">DevOps</option>
                <option value="manager">Manager</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('agent')">Cancel</button>
            <button class="btn-confirm" onclick="createAgent()">Create</button>
        </div>
    </div>
</div>

<div class="ws-notif" id="ws-notif"></div>

<script src="../scripts/sidebar.js"></script>
<script>
    const API     = 'http://localhost:8000';
    const headers = NexaAuth.headers;

    function openModal(t)  { document.getElementById('modal-' + t).classList.add('open'); }
    function closeModal(t) { document.getElementById('modal-' + t).classList.remove('open'); }

    function wsNotify(msg) {
        const el = document.getElementById('ws-notif');
        el.textContent = msg; el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    async function loadProjects() {
        const res = await fetch(`${API}/api/projects/`, { headers });
        const data = await res.json();
        document.getElementById('kpi-projects').textContent = data.length;
        const tbody = document.getElementById('projects-list');
        if (!data.length) { tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">No projects yet</td></tr>'; return; }
        tbody.innerHTML = data.slice(0,8).map(p => `
            <tr style="cursor:pointer" onclick="location.href='project_detail.html?id=${p.id}'">
                <td>${p.name}</td>
                <td><span class="badge badge-${p.priority}">${p.priority}</span></td>
                <td><span class="badge badge-${p.status}">${p.status.replace('_',' ')}</span></td>
            </tr>`).join('');
    }

    async function loadAgents() {
        const res  = await fetch(`${API}/api/agents/`, { headers });
        const data = await res.json();
        document.getElementById('kpi-agents').textContent = data.length;
        const list = document.getElementById('agents-list');
        if (!data.length) { list.innerHTML = '<div style="color:var(--muted);font-size:13px">No agents yet</div>'; return; }
        list.innerHTML = data.map(a => `
            <div class="agent-item">
                <div class="agent-avatar av-${a.agent_type}" style="width:36px;height:36px;font-size:12px;font-weight:700;color:#fff">${a.name.slice(0,2).toUpperCase()}</div>
                <div><div class="agent-name">${a.name}</div><div class="agent-type">${a.agent_type}</div></div>
                <span class="dot dot-${a.status}" style="margin-left:auto"></span>
            </div>`).join('');
    }

    async function loadTasks() {
        const res  = await fetch(`${API}/api/tasks/`, { headers });
        const data = await res.json();
        document.getElementById('kpi-tasks').textContent = data.length;
        document.getElementById('kpi-done').textContent  = data.filter(t => t.status === 'done').length;
    }

    async function createProject() {
        const res = await fetch(`${API}/api/projects/`, { method:'POST', headers, body: JSON.stringify({ name: document.getElementById('p-name').value, description: document.getElementById('p-desc').value, priority: document.getElementById('p-priority').value }) });
        if (res.ok) { closeModal('project'); loadProjects(); }
    }

    async function createAgent() {
        const res = await fetch(`${API}/api/agents/`, { method:'POST', headers, body: JSON.stringify({ name: document.getElementById('a-name').value, agent_type: document.getElementById('a-type').value }) });
        if (res.ok) { closeModal('agent'); loadAgents(); }
    }

    const ws = new WebSocket('ws://localhost:8000/ws/dashboard');
    ws.onmessage = e => {
        const d = JSON.parse(e.data);
        if (d.type === 'task_updated')      { wsNotify(`Task "${d.title}" → ${d.status}`); loadTasks(); }
        if (d.type === 'project_started')   { wsNotify(`Project "${d.name}" started!`); loadProjects(); }
        if (d.type === 'project_approved')  { wsNotify(`Project "${d.name}" approved`); loadProjects(); }
        if (d.type === 'project_submitted') { wsNotify(`Project "${d.name}" submitted for approval`); loadProjects(); }
    };

    loadProjects(); loadAgents(); loadTasks();
    setInterval(() => { loadProjects(); loadAgents(); loadTasks(); }, 15000);
</script>
</body>
</html>
