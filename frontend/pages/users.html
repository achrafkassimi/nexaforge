<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Users</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        body { display: flex; min-height: 100vh; align-items: flex-start; }

        .sidebar {
            width: 240px; min-height: 100vh;
            background: var(--bg2); border-right: 1px solid var(--border);
            padding: 24px 0; flex-shrink: 0;
        }
        .sidebar-logo {
            display: flex; align-items: center; gap: 10px;
            padding: 0 20px 24px; border-bottom: 1px solid var(--border);
        }
        .logo-mark {
            width: 32px; height: 32px; background: var(--purple);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-weight: 800;
        }
        .logo-name { font-weight: 700; font-size: 16px; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 20px; font-size: 14px; color: var(--muted);
            cursor: pointer; transition: all 0.15s;
            text-decoration: none; border-left: 2px solid transparent;
        }
        .nav-item:hover { color: var(--text); background: rgba(139,92,246,0.06); }
        .nav-item.active { color: var(--purple2); background: rgba(139,92,246,0.1); border-left-color: var(--purple); }

        .main { flex: 1; padding: 32px; min-height: 100vh; background: var(--bg); }

        .page-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 24px;
        }
        .page-title { font-size: 22px; font-weight: 700; }

        .add-btn {
            padding: 10px 20px; background: var(--purple);
            border: none; border-radius: 10px; color: white;
            font-size: 14px; cursor: pointer; width: auto;
        }

        .table-wrap {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        thead { background: var(--surface); }
        th {
            text-align: left; color: var(--muted);
            font-weight: 500; padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(139,92,246,0.06);
            color: var(--text);
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(139,92,246,0.03); }

        .user-cell {
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--purple); display: flex;
            align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: white;
            flex-shrink: 0;
        }
        .user-name { font-weight: 500; font-size: 13px; }
        .user-email { font-size: 11px; color: var(--muted); }

        .badge {
            display: inline-block; font-size: 11px;
            padding: 3px 10px; border-radius: 100px;
        }
        .badge-super_admin { background: rgba(232,121,249,0.15); color: #f0abfc; }
        .badge-manager     { background: rgba(139,92,246,0.15); color: var(--purple2); }
        .badge-chef_projet { background: rgba(59,130,246,0.15); color: #93c5fd; }
        .badge-agent       { background: rgba(16,185,129,0.15); color: #6ee7b7; }
        .badge-active      { background: rgba(74,222,128,0.15); color: #4ade80; }
        .badge-inactive    { background: rgba(148,144,181,0.15); color: var(--muted); }

        .action-btns { display: flex; gap: 8px; }
        .btn-icon {
            padding: 5px 10px; border-radius: 6px;
            border: 1px solid var(--border); background: transparent;
            color: var(--muted); font-size: 12px; cursor: pointer;
            width: auto; transition: all 0.15s;
        }
        .btn-icon:hover { border-color: var(--purple); color: var(--purple2); }
        .btn-icon.danger:hover { border-color: #f87171; color: #f87171; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 20px; padding: 32px;
            width: 100%; max-width: 440px;
        }
        .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        label { font-size: 12px; color: var(--muted); }
        select {
            width: 100%; padding: 11px 14px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            font-size: 14px; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel {
            flex: 1; padding: 11px; background: transparent;
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--muted); cursor: pointer; font-size: 14px;
        }
        .btn-confirm {
            flex: 1; padding: 11px; background: var(--purple);
            border: none; border-radius: 10px; color: white;
            cursor: pointer; font-size: 14px; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-mark">N</div>
        <div class="logo-name">NexaForge</div>
    </div>
    <a class="nav-item" href="dashboard.html">Dashboard</a>
    <a class="nav-item" href="projects.html">Projects</a>
    <a class="nav-item" href="agents.html">Agents</a>
    <a class="nav-item active" href="users.html">Users</a>
    <a class="nav-item" href="logs.html">Logs</a>
    <a class="nav-item" href="settings.html">Settings</a>
</div>

<div class="main">
    <div class="page-header">
        <div class="page-title">Users</div>
        <button class="add-btn" onclick="openModal()">+ New User</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-list">
                <tr><td colspan="5" style="color:var(--muted);text-align:center;padding:40px">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- MODAL CREATE -->
<div class="modal-overlay" id="modal-create">
    <div class="modal">
        <div class="modal-title">New User</div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="u-name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="u-email" placeholder="john@nexaforge.com">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="u-role">
                <option value="super_admin">Super Admin</option>
                <option value="manager">Manager</option>
                <option value="chef_projet">Chef de Projet</option>
                <option value="agent">Agent</option>
            </select>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="u-password" placeholder="••••••••">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="createUser()">Create</button>
        </div>
    </div>
</div>

<!-- MODAL EDIT -->
<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-title">Edit User</div>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="edit-name">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="edit-role">
                <option value="super_admin">Super Admin</option>
                <option value="manager">Manager</option>
                <option value="chef_projet">Chef de Projet</option>
                <option value="agent">Agent</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="edit-active">
                <option value="true">Active</option>
                <option value="false">Inactive</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="btn-confirm" onclick="updateUser()">Save</button>
        </div>
    </div>
</div>

<script>
    const API = "http://localhost:8000"
    const token = localStorage.getItem('token')
    if (!token) window.location.href = 'login.html'

    const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
    }

    let allUsers = []

    async function loadUsers() {
        const res = await fetch(`${API}/api/users/`, { headers })
        allUsers = await res.json()
        renderUsers(allUsers)
    }

    function renderUsers(users) {
        const tbody = document.getElementById('users-list')
        if (users.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:40px">No users found</td></tr>`
            return
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>
                    <div class="user-cell">
                        <div class="user-avatar">${u.full_name.slice(0,2).toUpperCase()}</div>
                        <div>
                            <div class="user-name">${u.full_name}</div>
                            <div class="user-email">${u.email}</div>
                        </div>
                    </div>
                </td>
                <td><span class="badge badge-${u.role}">${u.role}</span></td>
                <td><span class="badge badge-${u.is_active ? 'active' : 'inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                <td>${new Date(u.created_at).toLocaleDateString()}</td>
                <td>
                    <div class="action-btns">
                        <button class="btn-icon" onclick="openEditModal('${u.id}')">Edit</button>
                        <button class="btn-icon danger" onclick="deleteUser('${u.id}')">Delete</button>
                    </div>
                </td>
            </tr>
        `).join('')
    }

    function openModal() { document.getElementById('modal-create').classList.add('open') }
    function closeModal() { document.getElementById('modal-create').classList.remove('open') }

    function openEditModal(id) {
        const u = allUsers.find(u => u.id === id)
        document.getElementById('edit-id').value = u.id
        document.getElementById('edit-name').value = u.full_name
        document.getElementById('edit-role').value = u.role
        document.getElementById('edit-active').value = u.is_active.toString()
        document.getElementById('modal-edit').classList.add('open')
    }
    function closeEditModal() { document.getElementById('modal-edit').classList.remove('open') }

    async function createUser() {
        const res = await fetch(`${API}/api/auth/register`, {
            method: 'POST', headers,
            body: JSON.stringify({
                full_name: document.getElementById('u-name').value,
                email: document.getElementById('u-email').value,
                role: document.getElementById('u-role').value,
                password: document.getElementById('u-password').value
            })
        })
        if (res.ok) { closeModal(); loadUsers() }
    }

    async function updateUser() {
        const id = document.getElementById('edit-id').value
        const res = await fetch(`${API}/api/users/${id}`, {
            method: 'PUT', headers,
            body: JSON.stringify({
                full_name: document.getElementById('edit-name').value,
                role: document.getElementById('edit-role').value,
                is_active: document.getElementById('edit-active').value === 'true'
            })
        })
        if (res.ok) { closeEditModal(); loadUsers() }
    }

    async function deleteUser(id) {
        if (!confirm('Delete this user?')) return
        await fetch(`${API}/api/users/${id}`, { method: 'DELETE', headers })
        loadUsers()
    }

    loadUsers()
</script>
</body>
</html>
