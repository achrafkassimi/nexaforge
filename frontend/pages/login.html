<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Login</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--purple);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
        }

        .logo-name {
            font-size: 22px;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            background: var(--surface);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 9px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
            width: auto;
        }

        .tab.active {
            background: var(--purple);
            color: white;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        label {
            font-size: 12px;
            color: var(--muted);
        }

        select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .submit-btn {
            margin-top: 8px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-mark">N</div>
            <div class="logo-name">NexaForge</div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN -->
        <div class="panel active" id="panel-login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@nexaforge.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <div id="login-msg"></div>
            <button class="submit-btn" onclick="login()">Login</button>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Achraf Kassimi">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="you@nexaforge.com">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="reg-role">
                    <option value="super_admin">Super Admin</option>
                    <option value="manager">Manager</option>
                    <option value="chef_projet">Chef de Projet</option>
                    <option value="agent">Agent</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <div id="reg-msg"></div>
            <button class="submit-btn" onclick="register()">Create Account</button>
        </div>
    </div>

    <script>
        const API = "http://localhost:8000"

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'))
            document.getElementById('panel-' + tab).classList.add('active')
            event.currentTarget.classList.add('active')
        }

        async function login() {
            const email = document.getElementById('login-email').value
            const password = document.getElementById('login-password').value
            const msg = document.getElementById('login-msg')

            const res = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })

            const data = await res.json()

            if (res.ok) {
                localStorage.setItem('token', data.access_token)
                msg.className = 'success'
                msg.textContent = 'Login successful! Redirecting...'
                setTimeout(() => window.location.href = 'dashboard.html', 1000)
            } else {
                msg.className = 'error'
                // msg.textContent = data.detail || 'Login failed'
                msg.textContent = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail) || 'Login failed'

            }
        }

        async function register() {
            const name = document.getElementById('reg-name').value
            const email = document.getElementById('reg-email').value
            const role = document.getElementById('reg-role').value
            const password = document.getElementById('reg-password').value
            const msg = document.getElementById('reg-msg')

            const res = await fetch(`${API}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email, password,
                    full_name: name,
                    role
                })
            })

            const data = await res.json()

            if (res.ok) {
                msg.className = 'success'
                msg.textContent = 'Account created! Please login.'
                setTimeout(() => switchTab('login'), 1500)
            } else {
                msg.className = 'error'
                // msg.textContent = data.detail || 'Registration failed'
                msg.textContent = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail) || 'Registration failed'

            }
        }
    </script>
</body>
</html>
