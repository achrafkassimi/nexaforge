<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaForge — Agents</title>
    <link rel="stylesheet" href="../styles/globals.css">
    <style>
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; }
        .agent-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; transition: border-color 0.2s; }
        .agent-card:hover { border-color: var(--purple); }
        .ac-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .ac-avatar { width: 48px; height: 48px; border-radius: 12px; font-size: 16px; }
        .ac-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .status-text { font-size: 12px; color: var(--muted); }
        .ac-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid var(--border); }
        .ac-date { font-size: 11px; color: var(--muted); }
        .ac-actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
<div class="app-layout">
    <div id="app-sidebar"></div>
    <div class="main">
        <div class="page-header">
            <div class="page-title">Agents</div>
            <button class="add-btn" onclick="openModal()">+ New Agent</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterAgents('all',this)">All</button>
            <button class="filter-btn" onclick="filterAgents('backend',this)">Backend</button>
            <button class="filter-btn" onclick="filterAgents('frontend',this)">Frontend</button>
            <button class="filter-btn" onclick="filterAgents('database',this)">Database</button>
            <button class="filter-btn" onclick="filterAgents('devops',this)">DevOps</button>
            <button class="filter-btn" onclick="filterAgents('manager',this)">Manager</button>
        </div>

        <div class="agents-grid" id="agents-grid">
            <div class="empty-state"><div class="icon">🤖</div>Loading agents...</div>
        </div>
    </div>
</div>

<!-- CREATE -->
<div class="modal-overlay" id="modal-create">
    <div class="modal">
        <div class="modal-title">New Agent</div>
        <div class="form-group"><label>Agent Name</label><input type="text" id="a-name" placeholder="Nova"></div>
        <div class="form-group"><label>Agent Type</label>
            <select id="a-type">
                <option value="backend">Backend</option><option value="frontend">Frontend</option>
                <option value="database">Database</option><option value="devops">DevOps</option><option value="manager">Manager</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="createAgent()">Create</button>
        </div>
    </div>
</div>

<!-- EDIT -->
<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-title">Edit Agent</div>
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Name</label><input type="text" id="edit-name"></div>
        <div class="form-group"><label>Type</label>
            <select id="edit-type">
                <option value="backend">Backend</option><option value="frontend">Frontend</option>
                <option value="database">Database</option><option value="devops">DevOps</option><option value="manager">Manager</option>
            </select>
        </div>
        <div class="form-group"><label>Status</label>
            <select id="edit-status">
                <option value="idle">Idle</option><option value="working">Working</option><option value="blocked">Blocked</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
            <button class="btn-confirm" onclick="updateAgent()">Save</button>
        </div>
    </div>
</div>

<script src="../scripts/sidebar.js"></script>
<script>
    const API     = 'http://localhost:8000';
    const headers = NexaAuth.headers;
    let allAgents = [];

    async function loadAgents() {
        const res = await fetch(`${API}/api/agents/`, { headers });
        allAgents = await res.json();
        renderAgents(allAgents);
    }

    function renderAgents(agents) {
        const grid = document.getElementById('agents-grid');
        if (!agents.length) { grid.innerHTML = `<div class="empty-state"><div class="icon">🤖</div>No agents found</div>`; return; }
        grid.innerHTML = agents.map(a => `
            <div class="agent-card">
                <div class="ac-header">
                    <div class="ac-avatar agent-avatar av-${a.agent_type}">${a.name.slice(0,2).toUpperCase()}</div>
                    <div><div class="ac-name">${a.name}</div><span class="badge badge-${a.agent_type}">${a.agent_type}</span></div>
                </div>
                <div class="status-row">
                    <span class="dot dot-${a.status}"></span>
                    <span class="status-text">${a.status}</span>
                </div>
                <div class="ac-footer">
                    <span class="ac-date">${new Date(a.created_at).toLocaleDateString()}</span>
                    <div class="ac-actions">
                        <button class="btn btn-sm" onclick="openEditModal('${a.id}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteAgent('${a.id}')">Delete</button>
                    </div>
                </div>
            </div>`).join('');
    }

    function filterAgents(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderAgents(type === 'all' ? allAgents : allAgents.filter(a => a.agent_type === type));
    }

    function openModal()     { document.getElementById('modal-create').classList.add('open'); }
    function closeModal()    { document.getElementById('modal-create').classList.remove('open'); }
    function closeEditModal(){ document.getElementById('modal-edit').classList.remove('open'); }

    function openEditModal(id) {
        const a = allAgents.find(a => a.id === id);
        document.getElementById('edit-id').value      = a.id;
        document.getElementById('edit-name').value    = a.name;
        document.getElementById('edit-type').value    = a.agent_type;
        document.getElementById('edit-status').value  = a.status;
        document.getElementById('modal-edit').classList.add('open');
    }

    async function createAgent() {
        const res = await fetch(`${API}/api/agents/`, { method:'POST', headers, body: JSON.stringify({ name: document.getElementById('a-name').value, agent_type: document.getElementById('a-type').value }) });
        if (res.ok) { closeModal(); loadAgents(); }
    }

    async function updateAgent() {
        const id  = document.getElementById('edit-id').value;
        const res = await fetch(`${API}/api/agents/${id}`, { method:'PUT', headers, body: JSON.stringify({ name: document.getElementById('edit-name').value, agent_type: document.getElementById('edit-type').value, status: document.getElementById('edit-status').value }) });
        if (res.ok) { closeEditModal(); loadAgents(); }
    }

    async function deleteAgent(id) {
        if (!confirm('Delete this agent?')) return;
        await fetch(`${API}/api/agents/${id}`, { method:'DELETE', headers });
        loadAgents();
    }

    const ws = new WebSocket('ws://localhost:8000/ws/dashboard');
    ws.onmessage = () => loadAgents();

    loadAgents();
    setInterval(loadAgents, 15000);
</script>
</body>
</html>
